name: MW AI Auto-Improver

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  auto-improve:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Modify script.js if exists
        run: |
          if [ -f script.js ]; then
            sed -i 's/console.log/\/\/console.log/g' script.js
          fi
      
      - name: Update version.txt with timestamp
        run: |
          date +"%Y-%m-%d %H:%M:%S" >> version.txt
      
      - name: Configure Git
        run: |
          git config user.name "MW AI Bot"
          git config user.email "bot@mwai.com"
      
      - name: Commit changes
        run: |
          git add .
          git commit -m "🤖 Auto-improve: $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes"
      
      - name: Push changes
        run: |
          git push
