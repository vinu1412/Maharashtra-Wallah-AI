<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maharashtra Wallah AI | 10th & 12th Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">🚀 Maharashtra Wallah AI</div>
    </header>

    <main>
        <section class="hero">
            <h1>Board Exams 2026 ki Taiyari AI ke Saath!</h1>
            <p>Maharashtra State Board (HSC & SSC) Special Content</p>
        </section>

        <section class="sections">
            <div class="card">
                <h2>SSC (Class 10th)</h2>
                <button>Science</button>
                <button>Maths</button>
                <button>Marathi Grammar</button>
            </div>
            <div class="card">
                <h2>HSC (Class 12th)</h2>
                <button>Physics</button>
                <button>Chemistry</button>
                <button>Maths/Bio</button>
            </div>
        </section>

        <section class="ai-box">
            <h3>🤖 Ask Anything (AI Assistant)</h3>
            <input type="text" id="userInput" placeholder="Apna doubt yahan likho...">
            <button onclick="askAI()">Puchho!</button>
            <div id="aiResponse">Response yahan aayega...</div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
